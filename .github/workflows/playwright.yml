
name: Playwright Tests CI

# ─── TRIGGERS ────────────────────────────────────────────────
on:
  push:
    branches: [ main, master, develop ]    # Run on every push
  pull_request:
    branches: [ main, master ]             # Run on every PR
  schedule:
    - cron: '0 8 * * *'                   # Run daily at 8 AM UTC
  workflow_dispatch:                       # Allow manual trigger

# ─── JOBS ────────────────────────────────────────────────────
jobs:
  playwright-tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest                 # Use Ubuntu runner
    timeout-minutes: 60                    # Max job time

    strategy:
      fail-fast: false                     # Don't cancel others if one fails
      matrix:
        browser: [chromium, firefox, webkit]  # Run on all 3 browsers

    steps:

      # Step 1: Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'                     # Cache npm dependencies

      # Step 3: Install Node dependencies
      - name: Install dependencies
        run: npm ci                        # Clean install (faster than npm install)

      # Step 4: Install Playwright browsers
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}
        # --with-deps installs OS-level browser dependencies

      # Step 5: Run Playwright tests
      - name: Run Playwright Tests (${{ matrix.browser }})
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          CI: true
          BASE_URL: ${{ secrets.BASE_URL }}        # From GitHub Secrets
          TEST_USER: ${{ secrets.TEST_USER }}      # Sensitive credentials
          TEST_PASS: ${{ secrets.TEST_PASS }}      # Never hardcode these!

      # Step 6: Upload HTML report as artifact
      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()                       # Upload even if tests fail
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30               # Keep for 30 days

      # Step 7: Upload test results (for external tools)
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 7
